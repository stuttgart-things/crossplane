---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: clusterprofile-kcl
  labels:
    crossplane.io/xrd: clusterprofiles.platform.stuttgart-things.com
spec:
  compositeTypeRef:
    apiVersion: platform.stuttgart-things.com/v1alpha1
    kind: XClusterProfile
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: | # pragma: allowlist secret
            oxr  = option("params").oxr
            ocds = option("params").ocds

            _name      = oxr.metadata.name
            _namespace = oxr.metadata.namespace or "crossplane-system"
            _engine    = oxr.spec.gitops?.engine or "flux"

            # ── Derive provider config refs from clusterName ──
            _clusterName = oxr.spec?.clusterName or ""
            _helmPcr   = oxr.spec?.helmProviderConfigRef or ("{}-helm".format(_clusterName) if _clusterName else "")
            _k8sPcr    = oxr.spec?.kubernetesProviderConfigRef or ("{}-kubernetes".format(_clusterName) if _clusterName else "")

            _isReady = lambda resourceName: str -> bool {
                _found = resourceName in ocds
                _conds = ocds[resourceName].Resource?.status?.conditions or [] if _found else []
                any_true = len([c for c in _conds if c.type == "Ready" and c.status == "True"]) > 0
                any_true if _found else False
            }

            _resources = []

            # ── 0. Observe RemoteCluster (if clusterName set) ──
            _rcKey = "{}-observe-rc".format(_name)
            _observedEndpoint = ""
            _observedClusterType = ""
            _observedPodCIDR = ""

            if _clusterName:
                _observeRC = {
                    apiVersion = "kubernetes.m.crossplane.io/v1alpha1"
                    kind = "Object"
                    metadata = {
                        name = _rcKey
                        annotations = {
                            "crossplane.io/composition-resource-name" = _rcKey
                        }
                    }
                    spec = {
                        managementPolicies = ["Observe"]
                        forProvider = {
                            manifest = {
                                apiVersion = "kubeconfig.stuttgart-things.com/v1alpha1"
                                kind = "RemoteCluster"
                                metadata.name = _clusterName
                            }
                        }
                        providerConfigRef = {
                            name = "in-cluster"
                            kind = "ClusterProviderConfig"
                        }
                    }
                }
                _resources += [_observeRC]

                # Read observed data from RemoteCluster status
                _observedEndpoint = ocds[_rcKey].Resource?.status?.atProvider?.manifest?.status?.atProvider?.apiEndpoint or "" if _rcKey in ocds else ""
                _observedClusterType = ocds[_rcKey].Resource?.status?.atProvider?.manifest?.status?.atProvider?.clusterType or "" if _rcKey in ocds else ""
                _observedPodCIDR = ocds[_rcKey].Resource?.status?.atProvider?.manifest?.status?.atProvider?.podCIDR or "" if _rcKey in ocds else ""

            # Parse apiEndpoint (e.g. "https://10.31.104.101:6443") into host + port
            _apiHost = ""
            _apiPort = 6443
            if _observedEndpoint:
                _stripped = _observedEndpoint.replace("https://", "").replace("http://", "").rstrip("/")
                _parts = _stripped.split(":")
                _apiHost = _parts[0]
                _apiPort = int(_parts[1]) if len(_parts) > 1 else 6443

            # Per-distribution defaults (observed clusterType wins over spec)
            _clusterType = _observedClusterType or oxr.spec?.clusterType or ""

            # Gate: when using clusterName, wait for Observe to resolve clusterType
            _observeReady = bool(_clusterType) if _clusterName else True

            # ── 1. IP Reservation (before Cilium — provides LB IP) ──
            _ipr = oxr.spec?.ipReservation or {}
            _iprAutoEnabled = bool(_clusterName) and _clusterType != "kind"
            _iprEnabled = _ipr?.enabled if _ipr?.enabled != None else _iprAutoEnabled
            _iprKey = "{}-ip-reservation".format(_name)
            _iprReady = _isReady(_iprKey) if _iprEnabled else True

            # Read reserved IP + DNS info — prefer oxr.status (set by status step in prior loop)
            _oxrIPs = oxr.status?.ipAddresses or []
            _reservedIP = _oxrIPs[0] if _oxrIPs else ""
            _oxrFqdn = oxr.status?.fqdn or ""
            _oxrZone = oxr.status?.zone or ""
            # Strip "*." prefix from FQDN to get the bare domain for gateway/cert-manager
            _clusterDomain = _oxrFqdn.removeprefix("*.") if _oxrFqdn else ""

            if _iprEnabled and _observeReady:
                _ipReservation = {
                    apiVersion = "platform.stuttgart-things.com/v1alpha1"
                    kind = "XIPReservation"
                    metadata = {
                        name = "{}-ip-reservation".format(_name)
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-ip-reservation".format(_name)
                        }
                    }
                    spec = {
                        clusterName = _clusterName
                        count = _ipr?.count or 1
                        createDNS = _ipr?.createDNS if _ipr?.createDNS != None else True
                        clusterbookProviderConfigRef = _ipr?.clusterbookProviderConfigRef or "default"
                        **({} if not _ipr?.ip else {"ip": _ipr.ip})
                    }
                }
                _resources += [_ipReservation]

            # ── 2. VaultBaseSetup config (determines cert-manager + Cilium behavior) ──
            _vbs = oxr.spec?.vaultBaseSetup or {}
            _vbsAutoEnabled = bool(_clusterName) and _clusterType != "kind" and bool(_vbs?.vaultCaBundle)
            _vbsEnabled = bool(_vbs?.vaultCaBundle) and (bool(_clusterName) and _clusterType != "kind")
            _vbsKey = "{}-vault-base-setup".format(_name)
            _vbsReady = _isReady(_vbsKey) if _vbsEnabled else True

            # Wildcard cert secret name: cluster-specific for non-kind, generic for kind
            _wcSecretName = "wildcard-{}-tls".format(_clusterName) if _vbsEnabled and _clusterName else "wildcard-tls"

            # ── 3. cert-manager (moved before Cilium — provides CRDs for vault-base-setup) ──
            _cmEnabled = oxr.spec.certManager?.enabled or False
            _iprSatisfied = (bool(_reservedIP) if _iprEnabled else True)
            _cmGateSatisfied = _iprSatisfied if _iprEnabled else _observeReady

            if _cmEnabled and _cmGateSatisfied:
                _cmSpec = {
                    targetCluster = {
                        name = _helmPcr
                        kubernetesRef = _k8sPcr
                    }
                    install = {
                        enabled = True
                        version = oxr.spec.certManager?.version or "v1.19.1"
                        namespace = oxr.spec.certManager?.namespace or "cert-manager"
                    }
                }

                # Always enable selfSigned (CA chain) + wildcard cert
                _ss = oxr.spec.certManager?.selfSigned or {}
                _wcIssuer = _ss?.wildcard?.issuerName or ("vault-pki" if _vbsEnabled else "")
                _cmSpec |= {
                    selfSigned = {
                        enabled = True
                        caName = _ss?.caName or "cluster-ca"
                        wildcard = {
                            enabled = True
                            domain = _ss?.wildcard?.domain or _clusterDomain or "sthings.io"
                            name = _wcSecretName
                            secretName = _wcSecretName
                            namespace = _ss?.wildcard?.namespace or "default"
                            **({} if not _wcIssuer else {"issuerName": _wcIssuer})
                        }
                    }
                }

                _certManager = {
                    apiVersion = "platform.stuttgart-things.com/v1alpha1"
                    kind = "XCertManager"
                    metadata = {
                        name = "{}-cert-manager".format(_name)
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-cert-manager".format(_name)
                        }
                    }
                    spec = _cmSpec
                }
                _resources += [_certManager]

            _cmReady = _isReady("{}-cert-manager".format(_name)) if _cmEnabled else True

            # ── 4. VaultBaseSetup (gated on cert-manager — needs CRDs on target) ──
            if _vbsEnabled and _cmReady:
                _vaultBaseSetup = {
                    apiVersion = "resources.stuttgart-things.com/v1alpha1"
                    kind = "VaultBaseSetup"
                    metadata = {
                        name = _vbsKey
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = _vbsKey
                        }
                    }
                    spec = {
                        clusterName = _clusterName
                        vaultAddr = _vbs?.vaultAddr or "https://vault.sthings-infra.sthings-vsphere.labul.sva.de"
                        vaultCaBundle = _vbs?.vaultCaBundle or ""
                        kubeconfigSecretRef = {
                            name = "kubeconfig-{}".format(_clusterName)
                            namespace = "crossplane-system"
                            key = "kubeconfig"
                        }
                        certmanager = {
                            issuerEnabled = _vbs?.certmanager?.issuerEnabled if _vbs?.certmanager?.issuerEnabled != None else True
                            pkiRole = _vbs?.certmanager?.pkiRole or "sthings-vsphere"
                            policyName = _vbs?.certmanager?.policyName or "pki-issue"
                        }
                        providerConfigRef = _vbs?.providerConfigRef or "default"
                        **({} if not _vbs?.vaultTokenSecretRef else {"vaultTokenSecretRef": _vbs.vaultTokenSecretRef})
                    }
                }
                _resources += [_vaultBaseSetup]

                # Usage: VaultBaseSetup depends on cert-manager
                _vbsUsesCm = {
                    apiVersion = "protection.crossplane.io/v1beta1"
                    kind = "Usage"
                    metadata = {
                        name = "{}-vbs-uses-cert-manager".format(_name)
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-vbs-uses-cert-manager".format(_name)
                        }
                    }
                    spec = {
                        replayDeletion = True
                        of = {
                            apiVersion = "platform.stuttgart-things.com/v1alpha1"
                            kind = "XCertManager"
                            resourceRef.name = "{}-cert-manager".format(_name)
                        }
                        by = {
                            apiVersion = "resources.stuttgart-things.com/v1alpha1"
                            kind = "VaultBaseSetup"
                            resourceRef.name = _vbsKey
                        }
                    }
                }
                _resources += [_vbsUsesCm]

            # ── 5. TrustManager (non-kind, when vault is enabled) ──
            _tmKey = "{}-trust-manager".format(_name)
            _tmReady = _isReady(_tmKey) if _vbsEnabled else True

            if _vbsEnabled and _cmReady:
                _tmSpec = {
                    targetCluster = {
                        name = _helmPcr
                        kubernetesRef = _k8sPcr
                    }
                    install = {
                        enabled = True
                        namespace = oxr.spec.certManager?.namespace or "cert-manager"
                    }
                    bundle = {
                        enabled = True
                        secrets = [
                            {name = "cluster-ca-secret", key = "ca.crt"}
                        ]
                        inlineCAs = [
                            {name = "vault-pki-ca", ca = _vbs?.vaultCaBundle or ""}
                        ]
                    }
                }

                _trustManager = {
                    apiVersion = "platform.stuttgart-things.com/v1alpha1"
                    kind = "XTrustManager"
                    metadata = {
                        name = _tmKey
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = _tmKey
                        }
                    }
                    spec = _tmSpec
                }
                _resources += [_trustManager]

                # Usage: TrustManager depends on cert-manager
                _tmUsesCm = {
                    apiVersion = "protection.crossplane.io/v1beta1"
                    kind = "Usage"
                    metadata = {
                        name = "{}-tm-uses-cert-manager".format(_name)
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-tm-uses-cert-manager".format(_name)
                        }
                    }
                    spec = {
                        replayDeletion = True
                        of = {
                            apiVersion = "platform.stuttgart-things.com/v1alpha1"
                            kind = "XCertManager"
                            resourceRef.name = "{}-cert-manager".format(_name)
                        }
                        by = {
                            apiVersion = "platform.stuttgart-things.com/v1alpha1"
                            kind = "XTrustManager"
                            resourceRef.name = _tmKey
                        }
                    }
                }
                _resources += [_tmUsesCm]

            # ── 6. Cilium (gated on IP reservation + vault-base-setup) ──
            _cil = oxr.spec?.cilium or {}
            _cilEnabled = _cil?.enabled or False
            _ciliumReady = True

            _ciliumDefaults = {
                kind = {
                    routingMode = "native"
                    ipv4NativeRoutingCIDR = "10.244.0.0/16"
                    autoDirectNodeRoutes = True
                    devices = ["eth0", "net0"]
                    kubeProxyReplacement = True
                    operator = { replicas = 1 }
                    gatewayAPI = { enabled = False }
                    l2Announcements = { enabled = True }
                    externalIPs = { enabled = True }
                }
                k3s = {
                    routingMode = "tunnel"
                    ipv4NativeRoutingCIDR = "10.42.0.0/16"
                    autoDirectNodeRoutes = False
                    kubeProxyReplacement = True
                    operator = { replicas = 1 }
                    gatewayAPI = { enabled = True }
                    l2Announcements = { enabled = True }
                    externalIPs = { enabled = True }
                }
                rke2 = {
                    routingMode = "native"
                    ipv4NativeRoutingCIDR = "10.42.0.0/16"
                    autoDirectNodeRoutes = True
                    devices = ["eth0"]
                    kubeProxyReplacement = True
                    operator = { replicas = 2 }
                    gatewayAPI = { enabled = True }
                    l2Announcements = { enabled = False }
                    externalIPs = { enabled = True }
                }
                k8s = {
                    routingMode = "tunnel"
                    ipv4NativeRoutingCIDR = "10.244.0.0/16"
                    autoDirectNodeRoutes = False
                    devices = ["eth0"]
                    kubeProxyReplacement = True
                    operator = { replicas = 2 }
                    gatewayAPI = { enabled = True }
                    l2Announcements = { enabled = False }
                    externalIPs = { enabled = True }
                }
            }
            _typeDefaults = _ciliumDefaults[_clusterType] if _clusterType in _ciliumDefaults else {}

            _ciliumGateSatisfied = _iprSatisfied and (_vbsReady if _vbsEnabled else True)
            if _cilEnabled and _observeReady and _ciliumGateSatisfied:
                # Merge: type defaults -> then user overrides win
                _d = _typeDefaults
                _cilLb = _cil?.loadBalancer or {}
                _lbAutoEnabled = bool(_reservedIP) and _clusterType != "kind"
                _lbEnabled = _cilLb?.enabled if _cilLb?.enabled != None else _lbAutoEnabled
                _lbIpRange = _cilLb?.ipRange or {}
                if not _lbIpRange and _reservedIP:
                    _lbIpRange = {start = _reservedIP, end = _reservedIP}

                _cilGw = _cil?.gateway or {}
                _gwAutoEnabled = _clusterType != "kind"
                _gwEnabled = _cilGw?.enabled if _cilGw?.enabled != None else _gwAutoEnabled

                _cilSpec = {
                    targetCluster = {
                        name = _helmPcr
                        kubernetesRef = _k8sPcr
                    }
                    install = {
                        enabled = True
                        version = _cil?.version or "1.19.2"
                        namespace = _cil?.namespace or "kube-system"
                        kubeProxyReplacement = _cil?.kubeProxyReplacement if _cil?.kubeProxyReplacement != None else _d?.kubeProxyReplacement if _d else True
                        k8sServiceHost = _cil?.k8sServiceHost or _apiHost or ("{}-control-plane".format(_cil.clusterName) if _clusterType == "kind" and _cil?.clusterName else "")
                        k8sServicePort = _cil?.k8sServicePort or _apiPort
                        routingMode = _cil?.routingMode or _d?.routingMode or "native"
                        ipv4NativeRoutingCIDR = _cil?.ipv4NativeRoutingCIDR or _observedPodCIDR or _d?.ipv4NativeRoutingCIDR or "10.244.0.0/16"
                        autoDirectNodeRoutes = _cil.autoDirectNodeRoutes if _cil?.autoDirectNodeRoutes != None else (True if not _d else _d.autoDirectNodeRoutes)
                        **({} if not (_cil?.devices or _d?.devices) else {"devices": _cil?.devices or _d?.devices})
                        gatewayAPI = { enabled = _cil?.gatewayAPI?.enabled if _cil?.gatewayAPI?.enabled != None else _d?.gatewayAPI?.enabled if _d else True }
                        l2Announcements = { enabled = _cil?.l2Announcements?.enabled if _cil?.l2Announcements?.enabled != None else _d?.l2Announcements?.enabled if _d else True }
                        externalIPs = { enabled = _cil?.externalIPs?.enabled if _cil?.externalIPs?.enabled != None else _d?.externalIPs?.enabled if _d else True }
                        operator = { replicas = _cil?.operator?.replicas or _d?.operator?.replicas or 1 }
                    }
                    loadBalancer = {
                        enabled = _lbEnabled
                        ipMode = _cilLb?.ipMode or "static"
                        ipRange = _lbIpRange
                        **({"reservationRef": _cilLb.reservationRef} if _cilLb?.reservationRef else {})
                        poolName = _cilLb?.poolName or "default-pool"
                        l2PolicyName = _cilLb?.l2PolicyName or "default-l2-announcement-policy"
                    }
                    gateway = {
                        enabled = _gwEnabled
                        name = _cilGw?.name or "cilium-gateway"
                        namespace = _cilGw?.namespace or "default"
                        domain = _cilGw?.domain or _clusterDomain or "sthings.io"
                        tlsSecretName = _cilGw?.tlsSecretName or _wcSecretName
                    }
                }

                _cilium = {
                    apiVersion = "platform.stuttgart-things.com/v1alpha1"
                    kind = "XCilium"
                    metadata = {
                        name = "{}-cilium".format(_name)
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-cilium".format(_name)
                        }
                    }
                    spec = _cilSpec
                }
                _resources += [_cilium]

                # Usage: Cilium depends on IP reservation (ordering + deletion)
                if _iprEnabled:
                    _ciliumUsesIpr = {
                        apiVersion = "protection.crossplane.io/v1beta1"
                        kind = "Usage"
                        metadata = {
                            name = "{}-cilium-uses-ip-reservation".format(_name)
                            annotations = {
                                "crossplane.io/composition-resource-name" = "{}-cilium-uses-ip-reservation".format(_name)
                            }
                        }
                        spec = {
                            replayDeletion = True
                            of = {
                                apiVersion = "platform.stuttgart-things.com/v1alpha1"
                                kind = "XIPReservation"
                                resourceRef = {
                                    name = "{}-ip-reservation".format(_name)
                                }
                            }
                            by = {
                                apiVersion = "platform.stuttgart-things.com/v1alpha1"
                                kind = "XCilium"
                                resourceRef = {
                                    name = "{}-cilium".format(_name)
                                }
                            }
                        }
                    }
                    _resources += [_ciliumUsesIpr]

                # Usage: Cilium depends on VaultBaseSetup (ordering + deletion)
                if _vbsEnabled:
                    _ciliumUsesVbs = {
                        apiVersion = "protection.crossplane.io/v1beta1"
                        kind = "Usage"
                        metadata = {
                            name = "{}-cilium-uses-vault-base-setup".format(_name)
                            annotations = {
                                "crossplane.io/composition-resource-name" = "{}-cilium-uses-vault-base-setup".format(_name)
                            }
                        }
                        spec = {
                            replayDeletion = True
                            of = {
                                apiVersion = "resources.stuttgart-things.com/v1alpha1"
                                kind = "VaultBaseSetup"
                                resourceRef = {
                                    name = _vbsKey
                                }
                            }
                            by = {
                                apiVersion = "platform.stuttgart-things.com/v1alpha1"
                                kind = "XCilium"
                                resourceRef = {
                                    name = "{}-cilium".format(_name)
                                }
                            }
                        }
                    }
                    _resources += [_ciliumUsesVbs]

                # Gate: check if Cilium is ready before proceeding
                _ciliumReady = _isReady("{}-cilium".format(_name))

            # ── 6. FluxInit (gated on Cilium) ──────────────
            if _engine == "flux" and (_ciliumReady or not _cilEnabled):
                _defaultSources = [
                    {name = "flux-infra", kind = "OCIRepository", url = "oci://ghcr.io/stuttgart-things/flux-infra"}
                    {name = "flux-apps", kind = "OCIRepository", url = "oci://ghcr.io/stuttgart-things/flux-apps"}
                ]
                _userFlux = oxr.spec.flux or {}
                _userInstance = _userFlux.instance or {}
                _userSources = _userInstance.sources or []
                _mergedInstance = _userInstance | {sources = _userSources if _userSources else _defaultSources}
                _fluxSpec = {
                    helmProviderConfigRef = _helmPcr
                    kubernetesProviderConfigRef = _k8sPcr
                    **(_userFlux | {instance = _mergedInstance})
                }

                _fluxInit = {
                    apiVersion = "platform.stuttgart-things.com/v1alpha1"
                    kind = "FluxInit"
                    metadata = {
                        name = "{}-flux-init".format(_name)
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = "{}-flux-init".format(_name)
                        }
                    }
                    spec = _fluxSpec
                }
                _resources += [_fluxInit]

            items = _resources

    - step: patch-status
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            oxr  = option("params").oxr
            ocds = option("params").ocds

            _name   = oxr.metadata.name
            _engine = oxr.spec.gitops?.engine or "flux"
            _clusterName = oxr.spec?.clusterName or ""
            _helmPcr = oxr.spec?.helmProviderConfigRef or ("{}-helm".format(_clusterName) if _clusterName else "")

            _isReady = lambda resourceName: str -> bool {
                _found = resourceName in ocds
                _conds = ocds[resourceName].Resource?.status?.conditions or [] if _found else []
                any_true = len([c for c in _conds if c.type == "Ready" and c.status == "True"]) > 0
                any_true if _found else False
            }

            _cilEnabled = oxr.spec?.cilium?.enabled or False
            _cilReady = _isReady("{}-cilium".format(_name)) if _cilEnabled else True

            _gitopsReady = True if _engine == "none" else False
            if _engine == "flux":
                _gitopsReady = _isReady("{}-flux-init".format(_name))
            if _engine == "argocd":
                _gitopsReady = False

            _cmEnabled = oxr.spec.certManager?.enabled or False
            _cmReady = _isReady("{}-cert-manager".format(_name)) if _cmEnabled else True

            # IP reservation status
            _ipr = oxr.spec?.ipReservation or {}
            _rcKey = "{}-observe-rc".format(_name)
            _observedClusterType = ocds[_rcKey].Resource?.status?.atProvider?.manifest?.status?.atProvider?.clusterType or "" if _rcKey in ocds else ""
            _clusterType = _observedClusterType or oxr.spec?.clusterType or ""
            _iprAutoEnabled = bool(_clusterName) and _clusterType != "kind"
            _iprEnabled = _ipr?.enabled if _ipr?.enabled != None else _iprAutoEnabled
            _iprReady = _isReady("{}-ip-reservation".format(_name)) if _iprEnabled else True
            _iprKey = "{}-ip-reservation".format(_name)
            _ipAddresses = ocds[_iprKey].Resource?.status?.ipAddresses or [] if _iprKey in ocds else []
            _fqdn = ocds[_iprKey].Resource?.status?.fqdn or "" if _iprKey in ocds else ""
            _zone = ocds[_iprKey].Resource?.status?.zone or "" if _iprKey in ocds else ""

            # VaultBaseSetup status
            _vbs = oxr.spec?.vaultBaseSetup or {}
            _vbsAutoEnabled = bool(_clusterName) and _clusterType != "kind" and bool(_vbs?.vaultCaBundle)
            _vbsEnabled = bool(_vbs?.vaultCaBundle) and (bool(_clusterName) and _clusterType != "kind")
            _vbsReady = _isReady("{}-vault-base-setup".format(_name)) if _vbsEnabled else True
            _tmReady = _isReady("{}-trust-manager".format(_name)) if _vbsEnabled else True

            _oxr = oxr | {
                status = {
                    ready = _cilReady and _gitopsReady and _cmReady and _iprReady and _vbsReady and _tmReady
                    ciliumReady = _cilReady
                    gitopsEngine = _engine
                    gitopsReady = _gitopsReady
                    certManagerReady = _cmReady
                    ipReservationReady = _iprReady
                    vaultBaseSetupReady = _vbsReady
                    trustManagerReady = _tmReady
                    ipAddresses = _ipAddresses
                    fqdn = _fqdn
                    zone = _zone
                    providerConfigRef = _helmPcr
                }
            }

            items = [_oxr]

    - step: ready
      functionRef:
        name: function-auto-ready
