---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: clusterprofiles.platform.stuttgart-things.com
spec:
  group: platform.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: XClusterProfile
    plural: clusterprofiles
    singular: clusterprofile
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                  description: >-
                    Name of the RemoteCluster resource (kubeconfig.stuttgart-things.com).
                    When set, apiEndpoint, clusterType, podCIDR, and provider config refs
                    are derived automatically. Provider config refs default to
                    {clusterName}-helm and {clusterName}-kubernetes.
                helmProviderConfigRef:
                  type: string
                  description: >-
                    Name of the Helm ClusterProviderConfig for the target cluster.
                    Optional when clusterName is set (derived as {clusterName}-helm).
                kubernetesProviderConfigRef:
                  type: string
                  description: >-
                    Name of the Kubernetes ClusterProviderConfig for the target cluster.
                    Optional when clusterName is set (derived as {clusterName}-kubernetes).
                gitops:
                  type: object
                  properties:
                    engine:
                      type: string
                      enum:
                        - flux
                        - argocd
                        - none
                      default: flux
                      description: GitOps engine to deploy (flux, argocd, or none to skip)
                  description: GitOps engine selection and configuration
                flux:
                  type: object
                  description: Flux-specific overrides passed through to XFluxInit
                  properties:
                    namespace:
                      type: string
                    operatorChart:
                      type: object
                      properties:
                        version:
                          type: string
                        repoURL:
                          type: string
                    instance:
                      type: object
                      properties:
                        distribution:
                          type: string
                        components:
                          type: array
                          items:
                            type: string
                        sources:
                          type: array
                          items:
                            type: object
                            required:
                              - name
                              - url
                            properties:
                              name:
                                type: string
                              kind:
                                type: string
                                enum:
                                  - GitRepository
                                  - OCIRepository
                                default: OCIRepository
                              url:
                                type: string
                              ref:
                                type: string
                                default: latest
                              path:
                                type: string
                                default: "."
                              pullSecret:
                                type: string
                clusterType:
                  type: string
                  enum:
                    - kind
                    - k3s
                    - rke2
                    - k8s
                  description: >-
                    Kubernetes distribution type. When set, distribution-specific
                    defaults are applied for Cilium (routingMode, devices, etc.).
                    User-provided values always override the defaults.
                cilium:
                  type: object
                  description: Cilium CNI configuration passed through to XCilium
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Deploy Cilium via nested XCilium
                    version:
                      type: string
                      default: "1.19.2"
                    namespace:
                      type: string
                      default: kube-system
                    kubeProxyReplacement:
                      type: boolean
                      default: true
                    clusterName:
                      type: string
                      description: >-
                        Kind cluster name. When clusterType is "kind" and
                        k8sServiceHost is not set, k8sServiceHost is derived
                        as "{clusterName}-control-plane".
                    k8sServiceHost:
                      type: string
                      description: API server host (auto-derived for kind if clusterName is set)
                    k8sServicePort:
                      type: integer
                      default: 6443
                    routingMode:
                      type: string
                      enum:
                        - native
                        - tunnel
                      description: >-
                        Routing mode. No default — derived from clusterType
                        distribution defaults (k3s=tunnel, kind=native, etc.).
                    ipv4NativeRoutingCIDR:
                      type: string
                      description: >-
                        Pod CIDR for native routing. No default — derived from
                        observed RemoteCluster podCIDR or distribution defaults.
                    autoDirectNodeRoutes:
                      type: boolean
                      description: >-
                        Enable direct node routes. No default — derived from
                        clusterType distribution defaults.
                    devices:
                      type: array
                      items:
                        type: string
                      description: >-
                        Network devices for Cilium. No default — derived from
                        clusterType distribution defaults.
                    gatewayAPI:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                    l2Announcements:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                    externalIPs:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                    operator:
                      type: object
                      properties:
                        replicas:
                          type: integer
                          default: 1
                    loadBalancer:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        ipMode:
                          type: string
                          enum:
                            - static
                            - dynamic
                          default: static
                        ipRange:
                          type: object
                          properties:
                            start:
                              type: string
                            end:
                              type: string
                        reservationRef:
                          type: string
                        poolName:
                          type: string
                          default: default-pool
                    gateway:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        name:
                          type: string
                          default: cilium-gateway
                        namespace:
                          type: string
                          default: default
                        domain:
                          type: string
                        tlsSecretName:
                          type: string

                ipReservation:
                  type: object
                  description: >-
                    IP reservation via clusterbook. Auto-enabled for non-kind clusters
                    when clusterName is set. Skipped for kind clusters.
                  properties:
                    enabled:
                      type: boolean
                      description: >-
                        Reserve IPs from clusterbook. Defaults to true for non-kind
                        clusters when clusterName is set, false otherwise.
                    count:
                      type: integer
                      default: 1
                      description: Number of IP addresses to reserve
                    ip:
                      type: string
                      description: Explicit IP address (skips auto-reservation if set)
                    createDNS:
                      type: boolean
                      default: false
                      description: Create a PDNS wildcard DNS record for the reserved IP
                    clusterbookProviderConfigRef:
                      type: string
                      default: default
                      description: Name of the clusterbook ClusterProviderConfig

                certManager:
                  type: object
                  description: cert-manager configuration passed through to XCertManager
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Deploy cert-manager via nested XCertManager
                    version:
                      type: string
                      default: "v1.20.0"
                    namespace:
                      type: string
                      default: cert-manager
                    selfSigned:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        caName:
                          type: string
                          default: cluster-ca
                        wildcard:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            domain:
                              type: string
                              description: Wildcard domain (e.g. sthings.io)
                            secretName:
                              type: string
                              default: wildcard-tls
                            namespace:
                              type: string
                              default: default
            status:
              type: object
              properties:
                ready:
                  type: boolean
                  description: True when all sub-compositions are Ready
                gitopsEngine:
                  type: string
                  description: Active gitops engine (flux or argocd)
                ciliumReady:
                  type: boolean
                  description: True when Cilium sub-composition is Ready
                gitopsReady:
                  type: boolean
                  description: True when the gitops sub-composition is Ready
                certManagerReady:
                  type: boolean
                  description: True when the cert-manager sub-composition is Ready
                ipReservationReady:
                  type: boolean
                  description: True when the IP reservation sub-composition is Ready
                ipAddresses:
                  type: array
                  items:
                    type: string
                  description: Reserved IP addresses from clusterbook
                providerConfigRef:
                  type: string
                  description: Helm provider config ref carried through for downstream
