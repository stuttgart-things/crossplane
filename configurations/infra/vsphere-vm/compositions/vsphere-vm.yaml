---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vspherevm-kcl
  labels:
    crossplane.io/xrd: xvspherevm.infrastructure.stuttgart-things.com
spec:
  compositeTypeRef:
    apiVersion: infrastructure.stuttgart-things.com/v1alpha1
    kind: XVsphereVM
  mode: Pipeline
  pipeline:
    - step: load-defaults
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Reference
              ref:
                name: vsphere-vm-defaults

    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            oxr  = option("params").oxr
            ocds = option("params").ocds
            env  = option("params").ctx["apiextensions.crossplane.io/environment"] or {}

            _name = oxr.metadata.name
            _spec = oxr.spec

            # ── Environment defaults (from EnvironmentConfig) ──
            _envVsphere = env?.vsphere or {}

            # ── T-shirt sizes: resolve from EnvironmentConfig ──
            _sizes = _envVsphere?.sizes or {
                s = { numCpus = 2, memory = 2048, diskSize = 32 }
                m = { numCpus = 4, memory = 4096, diskSize = 64 }
                l = { numCpus = 8, memory = 8192, diskSize = 128 }
            }
            _size = _spec?.size or "m"
            _sizeDefaults = _sizes[_size] if _size in _sizes else _sizes["m"]

            # ── Merge: explicit spec > t-shirt size > hardcoded ──
            _vmName          = _spec.name
            _numCpus         = _spec?.numCpus or _sizeDefaults?.numCpus or 4
            _memory          = _spec?.memory or _sizeDefaults?.memory or 4096
            _diskSize        = _spec?.diskSize or _sizeDefaults?.diskSize or 64
            _thinProvisioned = _spec?.thinProvisioned if _spec?.thinProvisioned != None else True
            _guestId         = _spec?.guestId or "ubuntu64Guest"
            _firmware        = _spec?.firmware or "bios"
            _annotation      = _spec?.annotation or "VSPHERE-VM BUILD w/ CROSSPLANE"
            _providerConfig  = _spec?.providerConfigName or "default"

            # ── Resource pool resolution: explicit ID > alias > default alias ──
            _resourcePools = _envVsphere?.resourcePools or {}
            _defaultResourcePool = _envVsphere?.defaultResourcePool or ""
            _rp = _spec?.resourcePool or _defaultResourcePool
            _rpFromAlias = _resourcePools[_rp] if _rp and _rp in _resourcePools else ""
            _resourcePoolId = _spec?.resourcePoolId if _spec?.resourcePoolId else (_rpFromAlias if _rpFromAlias else "")

            # ── Datastore resolution: explicit ID > alias > default alias ──
            _datastores = _envVsphere?.datastores or {}
            _defaultDatastore = _envVsphere?.defaultDatastore or ""
            _ds = _spec?.datastore or _defaultDatastore
            _dsFromAlias = _datastores[_ds] if _ds and _ds in _datastores else ""
            _datastoreId = _spec?.datastoreId if _spec?.datastoreId else (_dsFromAlias if _dsFromAlias else "")
            # ── Network resolution: explicit ID > alias > default alias ──
            _networks = _envVsphere?.networks or {}
            _defaultNetwork = _envVsphere?.defaultNetwork or ""
            _net = _spec?.network or _defaultNetwork
            _netFromAlias = _networks[_net] if _net and _net in _networks else ""
            _networkId = _spec?.networkId if _spec?.networkId else (_netFromAlias if _netFromAlias else "")

            # ── Template resolution: explicit UUID > os alias > default os > legacy fallback ──
            _templates = _envVsphere?.templates or {}
            _defaultOs = _envVsphere?.defaultOs or ""
            _os = _spec?.os or _defaultOs
            _templateFromOs = _templates[_os] if _os and _os in _templates else ""
            _templateUuid = _spec?.templateUuid if _spec?.templateUuid else (_templateFromOs if _templateFromOs else "")
            _folder         = _spec?.folder if _spec?.folder else (_envVsphere?.folder or "")

            _resources = []

            # ── VirtualMachine ──────────────────────────────
            _vm = {
                apiVersion = "virtualmachine.vspherevm.stuttgart-things.com/v1alpha1"
                kind = "VirtualMachine"
                metadata = {
                    name = _name
                    annotations = {
                        "crossplane.io/external-name" = _vmName
                        "crossplane.io/composition-resource-name" = "{}-vm".format(_name)
                    }
                }
                spec = {
                    forProvider = {
                        name = _vmName
                        resourcePoolId = _resourcePoolId
                        datastoreId = _datastoreId
                        numCpus = _numCpus
                        memory = _memory
                        guestId = _guestId
                        firmware = _firmware
                        folder = _folder
                        annotation = _annotation
                        clone = [
                            {
                                templateUuid = _templateUuid
                            }
                        ]
                        networkInterface = [
                            {
                                networkId = _networkId
                            }
                        ]
                        disk = [
                            {
                                label = "disk0"
                                size = _diskSize
                                thinProvisioned = _thinProvisioned
                            }
                        ]
                    }
                    providerConfigRef = {
                        name = _providerConfig
                    }
                }
            }
            _resources += [_vm]

            items = _resources

    - step: patch-status
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            oxr  = option("params").oxr
            ocds = option("params").ocds

            _name = oxr.metadata.name
            _vmKey = "{}-vm".format(_name)

            _isReady = lambda resourceName: str -> bool {
                _found = resourceName in ocds
                _conds = ocds[resourceName].Resource?.status?.conditions or [] if _found else []
                any_true = len([c for c in _conds if c.type == "Ready" and c.status == "True"]) > 0
                any_true if _found else False
            }

            _vmReady = _isReady(_vmKey)

            # ── Extract observed status from the managed resource ──
            _vmStatus = ocds[_vmKey].Resource?.status?.atProvider or {} if _vmKey in ocds else {}

            _ipAddress         = _vmStatus?.defaultIpAddress or ""
            _guestIpAddresses  = _vmStatus?.guestIpAddresses or []
            _powerState        = _vmStatus?.powerState or ""
            _vmwareToolsStatus = _vmStatus?.vmwareToolsStatus or ""
            _uuid              = _vmStatus?.uuid or ""
            _moid              = _vmStatus?.moid or ""
            _vmName            = _vmStatus?.name or ""

            _oxr = oxr | {
                status = {
                    ready = _vmReady
                    ipAddress = _ipAddress
                    guestIpAddresses = _guestIpAddresses
                    powerState = _powerState
                    vmwareToolsStatus = _vmwareToolsStatus
                    uuid = _uuid
                    moid = _moid
                    vmName = _vmName
                }
            }

            items = [_oxr]

    - step: ready
      functionRef:
        name: function-auto-ready
