---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: vm-provision
  annotations:
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Unified VM provisioning with optional Ansible automation.
      Supports vSphere and Proxmox providers via a single API.
    meta.crossplane.io/readme: |
      Unified VM provisioning with optional Ansible automation.
      Supports vSphere and Proxmox providers via a single API.
spec:
  crossplane:
    version: ">=2.13.0"
  dependsOn:
    - provider: xpkg.upbound.io/upbound/provider-opentofu
      version: ">=v0.3.0"
    - provider: xpkg.upbound.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.9.3"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.0"
