---
apiVersion: platform.stuttgart-things.com/v1alpha1
kind: XCilium
metadata:
  name: test-cilium
  namespace: crossplane-system
spec:
  targetCluster:
    name: xplane-test-helm
    kubernetesRef: xplane-test-kubernetes
  install:
    enabled: true
    version: "1.19.2"
    namespace: kube-system
    kubeProxyReplacement: true
    k8sServiceHost: crossplane-test-control-plane
    k8sServicePort: 6443
    gatewayAPI:
      enabled: true
    l2Announcements:
      enabled: true
    externalIPs:
      enabled: true
    routingMode: native
    ipv4NativeRoutingCIDR: "10.244.0.0/16"
    autoDirectNodeRoutes: true
    devices:
      - eth0
      - net0
    operator:
      replicas: 2
  loadBalancer:
    enabled: true
    ipMode: static
    ipRange:
      start: "172.18.0.100"
      end: "172.18.0.110"
    poolName: default-pool
    l2PolicyName: default-l2-announcement-policy
  gateway:
    enabled: false
